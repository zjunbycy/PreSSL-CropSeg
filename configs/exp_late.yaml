# ─── Experiment: Galileo + Late Fusion (3D-Aware DPT) ───
# Main method — T collapse inside DPT decoder

model:
  encoder:
    type: "galileo"
    model_name: "BiliSakura/GALILEO-transformers"
    subfolder: "galileo-base-patch8"
    mode: "chunked"
    in_channels: 10
    img_size: 128
    freeze: true
    output_scales: 4
    temporal_chunk_size: 4
  fusion_strategy: "late"
  decoder_channels: 256
  temporal_module: "attention"
  collapse_schedule: [3, 2, 1, 0]

training:
  batch_size: 4
  num_epochs: 50
  learning_rate: 0.0005

logging:
  experiment_name: "galileo_late_fusion"
